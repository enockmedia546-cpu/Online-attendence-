<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBU Digital Register - Sign Up</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }
        .card {
            background: #141b2b;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #253044;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            color: #f0f3fa;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        h2 {
            color: #cbd5ff;
            font-size: 1.1rem;
            margin-bottom: 1.8rem;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            color: #94a3d8;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.85rem;
        }
        label .required {
            color: #ff6b6b;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            background: #0c1120;
            border: 1px solid #2a3448;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2d6aef;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2d6aef;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: #1b55cf;
        }
        button:disabled {
            background: #4a5a7a;
            cursor: not-allowed;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .mt-20 {
            margin-top: 20px;
            text-align: center;
        }
        a {
            color: #2d6aef;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .error-msg {
            color: #ff8a8a;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
        }
        .success-msg {
            color: #8aff8a;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
        }
        .loading {
            color: #94a3d8;
            text-align: center;
            margin-top: 12px;
        }
        .info-note {
            background: #1a2340;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #94a3d8;
            margin-top: 8px;
        }
        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Create Account</h1>
        <h2>Join the CBU Digital Class Register</h2>
        
        <form id="signupForm">
            <div class="grid-2">
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="signupName" required>
                </div>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="signupEmail" required>
                </div>
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" id="signupPassword" required>
                </div>
                <div class="form-group">
                    <label>Role <span class="required">*</span></label>
                    <select id="signupRole">
                        <option value="student">Student</option>
                        <option value="lecturer">Lecturer</option>
                    </select>
                </div>
            </div>
            
            <!-- Student Fields (Dynamic Dropdowns) -->
            <div id="studentFields" style="display: none;">
                <div class="grid-2">
                    <div class="form-group">
                        <label>SIN / Student ID <span class="required">*</span></label>
                        <input type="text" id="signupSin" placeholder="e.g., 21054321">
                    </div>
                    <div class="form-group">
                        <label>Year of Study <span class="required">*</span></label>
                        <select id="signupYear">
                            <option value="">Select Year</option>
                            <option value="Year 1">Year 1</option>
                            <option value="Year 2">Year 2</option>
                            <option value="Year 3">Year 3</option>
                            <option value="Year 4">Year 4</option>
                            <option value="Year 5">Year 5</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label>School / Faculty <span class="required">*</span></label>
                        <select id="signupSchool">
                            <option value="">Select School</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Program of Study <span class="required">*</span></label>
                        <select id="signupProgram" disabled>
                            <option value="">First select a school</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Course / Specialization <span class="required">*</span></label>
                    <select id="signupCourse" disabled>
                        <option value="">First select a program</option>
                    </select>
                </div>
                
                <div class="info-note">
                    💡 Note: Your school, program, and course selection determines which class sessions you can access.
                </div>
            </div>
            
            <!-- Lecturer Fields -->
            <div id="lecturerFields" style="display: none;">
                <div class="form-group">
                    <label>Course Code / Module <span class="required">*</span></label>
                    <input type="text" id="signupCourseCode" placeholder="e.g., CS 310">
                </div>
                <div class="form-group">
                    <label>School / Department</label>
                    <select id="lecturerSchool">
                        <option value="">Select School</option>
                    </select>
                </div>
                <div class="info-note">
                    💡 As a lecturer, you can create sessions for any course within your school.
                </div>
            </div>
            
            <button type="submit" id="submitBtn">Register Account →</button>
        </form>
        
        <p class="mt-20">Already have an account? <a href="login.html">Login here</a></p>
        <div id="message"></div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
           apiKey: "AIzaSyBNpjy5UDXo8affem8rJnzLlqZKgjmDQpM",
  authDomain: "attendence-2bf1e.firebaseapp.com",
  projectId: "attendence-2bf1e",
  storageBucket: "attendence-2bf1e.firebasestorage.app",
  messagingSenderId: "713605798743",
  appId: "1:713605798743:web:98040dcc16ae69236ebc12",
  measurementId: "G-B5WCTL378P"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================
        // CBU DATA STRUCTURE - SCHOOLS, PROGRAMS, COURSES
        // ============================================
        
        const cbuData = {
            schools: [
                {
                    name: "School of Natural Resources",
                    programs: [
                        {
                            name: "Computer Science",
                            courses: ["Web Development", "Database Systems", "Data Structures", "Software Engineering", "Network Security", "Mobile App Development", "Artificial Intelligence"]
                        },
                        {
                            name: "Information Technology",
                            courses: ["IT Fundamentals", "System Administration", "Cloud Computing", "Cybersecurity", "Network Management", "Database Administration"]
                        },
                        {
                            name: "Information Systems",
                            courses: ["Business Intelligence", "Enterprise Systems", "System Analysis", "IT Project Management", "Data Analytics"]
                        }
                    ]
                },
                {
                    name: "School of Business",
                    programs: [
                        {
                            name: "Business Administration",
                            courses: ["Principles of Management", "Marketing", "Organizational Behavior", "Strategic Management", "Business Ethics", "Entrepreneurship"]
                        },
                        {
                            name: "Accounting",
                            courses: ["Financial Accounting", "Management Accounting", "Taxation", "Auditing", "Corporate Finance", "Accounting Information Systems"]
                        },
                        {
                            name: "Economics",
                            courses: ["Microeconomics", "Macroeconomics", "Econometrics", "Development Economics", "International Trade", "Public Finance"]
                        }
                    ]
                },
                {
                    name: "School of Engineering",
                    programs: [
                        {
                            name: "Electrical Engineering",
                            courses: ["Circuit Theory", "Electronics", "Power Systems", "Control Systems", "Digital Signal Processing", "Renewable Energy"]
                        },
                        {
                            name: "Mechanical Engineering",
                            courses: ["Thermodynamics", "Fluid Mechanics", "Machine Design", "Manufacturing Processes", "CAD/CAM", "Automotive Engineering"]
                        },
                        {
                            name: "Civil Engineering",
                            courses: ["Structural Analysis", "Geotechnical Engineering", "Transportation Engineering", "Water Resources", "Construction Management"]
                        }
                    ]
                },
                {
                    name: "School of Medicine",
                    programs: [
                        {
                            name: "Medicine and Surgery",
                            courses: ["Anatomy", "Physiology", "Pathology", "Pharmacology", "Clinical Medicine", "Surgery", "Pediatrics", "Obstetrics"]
                        },
                        {
                            name: "Nursing",
                            courses: ["Fundamentals of Nursing", "Medical-Surgical Nursing", "Community Health", "Mental Health Nursing", "Pediatric Nursing"]
                        }
                    ]
                },
                {
                    name: "School of Education",
                    programs: [
                        {
                            name: "Mathematics Education",
                            courses: ["Algebra", "Calculus", "Geometry", "Statistics", "Mathematics Teaching Methods", "Educational Psychology"]
                        },
                        {
                            name: "Science Education",
                            courses: ["Biology Teaching Methods", "Chemistry Teaching Methods", "Physics Teaching Methods", "Curriculum Design", "Assessment Techniques"]
                        }
                    ]
                }
            ]
        };

        // Populate School dropdowns
        function populateSchools() {
            const studentSchoolSelect = document.getElementById('signupSchool');
            const lecturerSchoolSelect = document.getElementById('lecturerSchool');
            
            cbuData.schools.forEach(school => {
                const option1 = document.createElement('option');
                option1.value = school.name;
                option1.textContent = school.name;
                studentSchoolSelect.appendChild(option1);
                
                const option2 = document.createElement('option');
                option2.value = school.name;
                option2.textContent = school.name;
                lecturerSchoolSelect.appendChild(option2);
            });
        }

        // When School changes, update Programs dropdown
        function updatePrograms() {
            const schoolSelect = document.getElementById('signupSchool');
            const programSelect = document.getElementById('signupProgram');
            const courseSelect = document.getElementById('signupCourse');
            
            const selectedSchool = schoolSelect.value;
            
            if (!selectedSchool) {
                programSelect.innerHTML = '<option value="">First select a school</option>';
                programSelect.disabled = true;
                courseSelect.innerHTML = '<option value="">First select a program</option>';
                courseSelect.disabled = true;
                return;
            }
            
            const school = cbuData.schools.find(s => s.name === selectedSchool);
            
            if (school) {
                programSelect.innerHTML = '<option value="">Select Program</option>';
                school.programs.forEach(program => {
                    const option = document.createElement('option');
                    option.value = program.name;
                    option.textContent = program.name;
                    programSelect.appendChild(option);
                });
                programSelect.disabled = false;
                courseSelect.innerHTML = '<option value="">First select a program</option>';
                courseSelect.disabled = true;
            } else {
                programSelect.innerHTML = '<option value="">No programs available</option>';
                programSelect.disabled = true;
                courseSelect.disabled = true;
            }
        }

        // When Program changes, update Courses dropdown
        function updateCourses() {
            const schoolSelect = document.getElementById('signupSchool');
            const programSelect = document.getElementById('signupProgram');
            const courseSelect = document.getElementById('signupCourse');
            
            const selectedSchool = schoolSelect.value;
            const selectedProgram = programSelect.value;
            
            if (!selectedSchool || !selectedProgram) {
                courseSelect.innerHTML = '<option value="">First select a program</option>';
                courseSelect.disabled = true;
                return;
            }
            
            const school = cbuData.schools.find(s => s.name === selectedSchool);
            
            if (school) {
                const program = school.programs.find(p => p.name === selectedProgram);
                
                if (program) {
                    courseSelect.innerHTML = '<option value="">Select Course</option>';
                    program.courses.forEach(course => {
                        const option = document.createElement('option');
                        option.value = course;
                        option.textContent = course;
                        courseSelect.appendChild(option);
                    });
                    courseSelect.disabled = false;
                } else {
                    courseSelect.innerHTML = '<option value="">No courses available</option>';
                    courseSelect.disabled = true;
                }
            }
        }

        // Toggle between Student and Lecturer fields
        const roleSelect = document.getElementById('signupRole');
        const studentFields = document.getElementById('studentFields');
        const lecturerFields = document.getElementById('lecturerFields');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        function toggleFields() {
            if (roleSelect.value === 'student') {
                studentFields.style.display = 'block';
                lecturerFields.style.display = 'none';
                // Make student fields required
                document.getElementById('signupSin').required = true;
                document.getElementById('signupYear').required = true;
                document.getElementById('signupSchool').required = true;
                document.getElementById('signupProgram').required = true;
                document.getElementById('signupCourse').required = true;
            } else {
                studentFields.style.display = 'none';
                lecturerFields.style.display = 'block';
                // Remove student field requirements
                document.getElementById('signupSin').required = false;
                document.getElementById('signupYear').required = false;
                document.getElementById('signupSchool').required = false;
                document.getElementById('signupProgram').required = false;
                document.getElementById('signupCourse').required = false;
            }
        }

        // Event listeners for cascading dropdowns
        document.getElementById('signupSchool').addEventListener('change', () => {
            updatePrograms();
        });
        
        document.getElementById('signupProgram').addEventListener('change', () => {
            updateCourses();
        });

        roleSelect.addEventListener('change', toggleFields);
        
        // Initialize
        populateSchools();
        toggleFields();

        // Form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const name = document.getElementById('signupName').value;
            const role = roleSelect.value;
            
            messageDiv.innerHTML = '<div class="loading">Creating account...</div>';
            submitBtn.disabled = true;
            
            try {
                // Create user in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const firebaseUser = userCredential.user;
                
                // Build user data for Firestore
                let userData = {
                    uid: firebaseUser.uid,
                    name: name,
                    email: email,
                    role: role,
                    createdAt: new Date().toISOString()
                };
                
                if (role === 'student') {
                    const school = document.getElementById('signupSchool').value;
                    const program = document.getElementById('signupProgram').value;
                    const course = document.getElementById('signupCourse').value;
                    
                    if (!school || !program || !course) {
                        throw new Error('Please select school, program, and course');
                    }
                    
                    userData.sin = document.getElementById('signupSin').value || 'N/A';
                    userData.school = school;
                    userData.program = program;
                    userData.course = course;
                    userData.year = document.getElementById('signupYear').value;
                } else {
                    userData.course = document.getElementById('signupCourseCode').value || 'General';
                    userData.school = document.getElementById('lecturerSchool').value || 'Not Specified';
                    userData.sin = '';
                    userData.program = '';
                    userData.year = '';
                }
                
                // Save to Firestore
                await db.collection('users').doc(firebaseUser.uid).set(userData);
                
                messageDiv.innerHTML = '<div class="success-msg">✅ Registration successful! Redirecting to login...</div>';
                
                // Sign out and redirect
                await auth.signOut();
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/email-already-in-use') {
                    messageDiv.innerHTML = '<div class="error-msg">Email already registered. Please login instead.</div>';
                } else if (error.code === 'auth/weak-password') {
                    messageDiv.innerHTML = '<div class="error-msg">Password should be at least 6 characters.</div>';
                } else {
                    messageDiv.innerHTML = `<div class="error-msg">${error.message}</div>`;
                }
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
