<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBU Digital Register - Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }
        .card {
            background: #141b2b;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #253044;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #f0f3fa;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        h2 {
            color: #cbd5ff;
            font-size: 1.2rem;
            margin-bottom: 1.8rem;
            font-weight: 500;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            color: #94a3d8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: #0c1120;
            border: 1px solid #2a3448;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2d6aef;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2d6aef;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover {
            background: #1b55cf;
        }
        .mt-20 {
            margin-top: 20px;
            text-align: center;
        }
        a {
            color: #2d6aef;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .error-msg {
            color: #ff8a8a;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
        }
        .loading {
            text-align: center;
            color: #94a3d8;
            margin-top: 12px;
        }
        .demo-info {
            margin-top: 24px;
            background: #0c1120;
            border-radius: 16px;
            padding: 12px;
            font-size: 0.8rem;
            color: #94a3d8;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 CBU Digital Class Register</h1>
        <h2>Login to Your Account</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" required placeholder="student@cbu.zm">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="••••••">
            </div>
            
            <div class="form-group">
                <label>Role</label>
                <select id="loginRole">
                    <option value="student">Student</option>
                    <option value="lecturer">Lecturer</option>
                </select>
            </div>
            
            <button type="submit">Login →</button>
        </form>
        
        <p class="mt-20">Don't have an account? <a href="signup.html">Sign up here</a></p>
        
        <div class="demo-info">
            <p>📌 Demo: Create a new account or use existing ones</p>
            <p>All data is stored securely in Firebase Cloud</p>
        </div>
        
        <div id="errorMsg" class="error-msg"></div>
        <div id="loadingMsg" class="loading"></div>
    </div>

    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBNpjy5UDXo8affem8rJnzLlqZKgjmDQpM",
  authDomain: "attendence-2bf1e.firebaseapp.com",
  projectId: "attendence-2bf1e",
  storageBucket: "attendence-2bf1e.firebasestorage.app",
  messagingSenderId: "713605798743",
  appId: "1:713605798743:web:98040dcc16ae69236ebc12",
  measurementId: "G-B5WCTL378P"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loadingMsg = document.getElementById('loadingMsg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const role = document.getElementById('loginRole').value;
            
            errorMsg.textContent = '';
            loadingMsg.textContent = 'Logging in...';
            
            try {
                // Sign in with Firebase Auth
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const firebaseUser = userCredential.user;
                
                // Get user data from Firestore
                const userDoc = await db.collection('users').doc(firebaseUser.uid).get();
                
                if (!userDoc.exists) {
                    await auth.signOut();
                    throw new Error('User profile not found. Please sign up first.');
                }
                
                const userData = userDoc.data();
                
                // Verify role matches
                if (userData.role !== role) {
                    await auth.signOut();
                    throw new Error(`Invalid role. You are registered as a ${userData.role}.`);
                }
                
                // Store user info in sessionStorage
                sessionStorage.setItem('userUid', firebaseUser.uid);
                sessionStorage.setItem('userRole', userData.role);
                sessionStorage.setItem('userName', userData.name);
                sessionStorage.setItem('userEmail', userData.email);
                sessionStorage.setItem('userCourse', userData.course || '');
                if (userData.role === 'student') {
                    sessionStorage.setItem('userSin', userData.sin || '');
                    sessionStorage.setItem('userProgram', userData.program || '');
                    sessionStorage.setItem('userYear', userData.year || '');
                }
                
                // Redirect based on role
                if (role === 'student') {
                    window.location.href = 'student.html';
                } else {
                    window.location.href = 'lecturer.html';
                }
                
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMsg.textContent = 'Invalid email or password. Please try again or sign up.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg.textContent = 'Please enter a valid email address.';
                } else {
                    errorMsg.textContent = error.message || 'Login failed. Please try again.';
                }
            } finally {
                loadingMsg.textContent = '';
            }
        });
    </script>
</body>
</html>
